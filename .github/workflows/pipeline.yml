name: SalaCine CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validar-frontend:
    name: Build e Validacao do Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./SalaCineFront-main
    
    steps:
      - name: Checkout do Repositorio
        uses: actions/checkout@v4
        
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Instalar Dependencias
        run: npm install

      # Auditoria de seguranca
      - name: Auditoria de Seguranca de Pacotes
        run: npm audit --audit-level=high

      # teste simples do jest para ver se a tela renderiza
      - name: Executar Testes de Interface (Jest)
        run: npm run test
        
      - name: Verificar Compilacao (Build)
        run: npm run build

  validar-backend:
    name: Build e Validacao do Backend (Flask/Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./SalaCineBack-main
        
    steps:
      - name: Checkout do Repositorio
        uses: actions/checkout@v4
        
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar Dependencias
        run: pip install -r requirements.txt

      # os testes simples do pytest
      - name: Executar Testes da API e Banco de Dados (Pytest)
        run: pytest test_api.py
        
      # O Deploy Continuo (CD) e gerido automaticamente pela Vercel